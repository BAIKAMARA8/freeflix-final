<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FREEFLIX 1.0 | Premium Streaming</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#050505] text-white no-scrollbar">

    <div id="splash" class="fixed inset-0 bg-[#050505] z-[1000] flex items-center justify-center transition-opacity duration-700">
        <h1 class="text-4xl font-black text-[#00F2FF] italic animate-pulse tracking-tighter">FREEFLIX 1.0</h1>
    </div>

    <nav class="p-4 border-b border-white/5 flex justify-between items-center sticky top-0 bg-[#050505]/95 backdrop-blur-xl z-50">
        <h1 class="font-black italic text-lg">FREEFLIX <span class="text-[#00F2FF]">1.0</span></h1>
        <div id="admin-status" class="text-[8px] border border-white/10 px-3 py-1 rounded-full text-white/30 uppercase tracking-widest">Secure Line</div>
    </nav>

    <div id="admin-panel" class="hidden bg-[#0a0a0a] p-6 border-b border-[#00F2FF]/20">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <input id="up-title" placeholder="Title">
            <input id="up-poster" placeholder="Poster URL">
            <input id="up-video" placeholder="Dropbox Video Link">
            <select id="up-category" class="bg-[#111] p-3 rounded-xl border border-white/10 text-xs">
                <option value="Movies">Movies</option>
                <option value="Series">Series</option>
                <option value="Salone">Sierra Leone</option>
            </select>
            <button onclick="uploadMovie()" class="bg-[#00F2FF] text-black font-black p-4 rounded-xl text-xs uppercase col-span-full">Publish Content</button>
        </div>
    </div>

    <main class="p-4">
        <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
    </main>

    <div id="player-overlay" class="hidden fixed inset-0 bg-black z-[200] flex flex-col">
        <div class="p-4 flex justify-between items-center bg-[#050505]">
            <h2 id="playing-title" class="text-xs font-bold uppercase truncate">...</h2>
            <button onclick="closePlayer()" class="text-xl">✕</button>
        </div>
        <div id="player-container" class="flex-1 bg-black flex items-center justify-center"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
